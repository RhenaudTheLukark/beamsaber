<form class='{{cssClass}}' autocomplete='off'>
  <header class='sheet-header'>
    <img src='{{img}}' data-edit='img' data-tooltip='{{name}}' />
    <div class='header-fields'>
      <h1 class='charname'><input name='name' type='text' value='{{name}}' placeholder='{{localize 'BITD.Name'}}' />
    </div>
  </header>

  <section class='flex-vertical'>
    <label class='label-stripe'>{{localize 'BITD.Description'}}</label>
    {{#if editable}}
      <prose-mirror name="system.description" button="true" editable="{{editable}}" toggled="false" value="{{system.description}}">
        {{{system.description}}}
      </prose-mirror>
    {{else}}
      {{{system.description}}}
    {{/if}}
    <label class='label-stripe'>{{localize 'BITD.ExpClues'}}</label>
    {{#if editable}}
      <prose-mirror name="system.experience_clues" button="true" editable="{{editable}}" toggled="false" value="{{system.experience_clues}}">
        {{{system.experience_clues}}}
      </prose-mirror>
    {{else}}
      {{{system.experience_clues}}}
    {{/if}}
    {{#if isGM}}
    <div class='label-stripe'>{{localize 'BITD.Effects'}}</div>
    <div id='effects'>{{> 'systems/beamsaber/templates/parts/active-effects.html'}}</div>
    {{/if}}
  </section>
</form>
