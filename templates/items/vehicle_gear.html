<form class='{{cssClass}}' autocomplete='off'>
  <header class='sheet-header'>
    <img src='{{img}}' data-edit='img' data-tooltip='{{name}}'/>
    <div class='header-fields'>
      <h1 class='charname'><input name='name' type='text' value='{{name}}' placeholder='{{localize 'BITD.Name'}}'/></h1>
    </div>
  </header>

  {{!-- Sheet Body --}}
  <section class='sheet-body flex'>
    {{#if editable}}
      <prose-mirror name="system.description" button="true" editable="{{editable}}" toggled="false" value="{{system.description}}">
        {{{system.description}}}
      </prose-mirror>
    {{else}}
      {{{system.description}}}
    {{/if}}
  </section>
  <div class='flex-vertical'>
    <div class='flex-horizontal'>
      <div class='three-line'>
        <label class='label-stripe'>{{localize 'BITD.Load'}}</label>
        <input type='number' name='system.load' value='{{system.load}}' onkeypress='return BladesHelpers.isNumberKey(event)' placeholder='{{localize 'BITD.Load'}}'>
      </div>
      <div class='three-line'>
        <label class='label-stripe'>{{localize 'BITD.Uses'}}</label>
        <input type='number' name='system.uses.max' value='{{system.uses.max}}' onkeypress='return BladesHelpers.isNumberKey(event)' placeholder='{{localize 'BITD.Uses'}}'>
      </div>
      <div class='three-line'>
        <label class='label-stripe'>{{localize 'BITD.Class'}}</label>
        <input type='text' name='system.class' value='{{system.class}}' placeholder='{{localize 'BITD.Class'}}'>
      </div>
    </div>
    <div class='flex-horizontal'>
      <div class='three-line'>
        <label class='label-stripe'>{{localize 'BITD.IsContainer'}}</label>
        <input type='checkbox' name='system.is_container' {{checked system.is_container}}>
      </div>
      {{#if system.is_container}}
      <div class='three-line'>
        <label class='label-stripe'>{{localize 'BITD.ContainerLoad'}}</label>
        <input type='number' name='system.container_load' onkeypress='return BladesHelpers.isNumberKey(event)' value='{{system.container_load}}'>
      </div>
      <div class='three-line'>
        <label class='label-stripe'>{{localize 'BITD.ContainerItemTypes'}}</label>
        <select name='system.container_item_types' data-tooltip='BITD.MultipleSelectUsage' multiple>
          {{selectOptionsWithLabel system.container_item_type_list selected=system.container_item_types localize=true}}
        </select>
      </div>
      {{/if}}
    </div>
    {{#if isGM}}
      <!-- <div class='label-stripe'>{{localize 'BITD.Logic'}}</div> -->
      <!-- <textarea name='system.logic'>{{{system.logic}}}</textarea> -->
      <div class='label-stripe'>{{localize 'BITD.Effects'}}</div>
      <div id='effects'>{{> 'systems/beamsaber/templates/parts/active-effects.html'}}</div>
    {{/if}}
  </div>
</form>
