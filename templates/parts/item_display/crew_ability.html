<div class="item flex-horizontal" data-item-id="{{item._id}}">
  <div class="item-body flex-horizontal">
    <div class="item-name"><p>{{item.name}}</p></div>
    <div class="item-description">{{{item.system.description}}}</div>
  </div>
  {{#if (gteq item.system.uses.max 1)}}
  <div class="supply-container flex-vertical">
    <label id="{{actor.type}}-{{actor._id}}-abilities-uses-{{id}}"><b>{{localize 'BITD.UsesShort'}}</b></label>
    <div class="supply uses">
      {{#multiboxes item.system.uses.value}}
      {{#times_from 0 item.system.uses.max}}
      <input id="{{../actor.type}}-{{../actor._id}}-abilities-uses-{{id}}-{{this}}" type="radio" name="item.system.uses.value" value="{{this}}">
      <label class="radio-toggle{{#if (lteq this ../item.system.uses.value)}} enabled{{/if}}"></label>
      {{/times_from}}
      {{/multiboxes}}
    </div>
  </div>
  {{/if}}
  <div class="item-controls flex-horizontal">
    <a class="item-control delete-item" data-tooltip="{{localize 'BITD.TitleDeleteItem'}}"><i class="fas fa-trash"></i></a>
    <a class="item-control item-post" data-tooltip="{{localize 'BITD.TitlePostItem'}}"><i class="fas fa-comment"></i></a>
  </div>
</div>
